    :root {
      --clr-primary: #126a83;      /* Teal */
      --clr-secondary: #023E4D;    /* Deep Navy */
      --clr-tertiary: #FF6B6B;     /* Soft Coral */
      --clr-bg: #F5F9FA;           /* Light background */
      --clr-surface: #FFFFFF;      /* Surface white */
      --clr-text: #212529;         /* Default text */
      --clr-muted: #6C757D;        /* Muted text */
    }
    /* Full page layout */
    body {
      margin: 0;
      background: var(--clr-bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--clr-text);
      overflow-x: hidden;
    }
    /* Main card container */
                .bulk-card {
          background: var(--clr-surface);
          border-radius: 12px;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
          width: 90%;
          max-width: 1300px;
          overflow: hidden;
          animation: slideIn 0.8s ease-out;
          margin-left: auto;    /* Center horizontally */
          margin-right: auto;   /* Center horizontally */
          margin-top: 15px !important;
        }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    /* Header with animated background */
    .card-header {
      background: var(--clr-secondary);
      color: var(--clr-surface);
      padding: 0.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .card-header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 600;
    }
    .card-header::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 45deg, var(--clr-tertiary), var(--clr-secondary));
      animation: spin 10s linear infinite;
      opacity: 0.15;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    /* Lottie animation in header */
    .header-lottie {
      position: absolute;
      right: 1rem;
      top: 1rem;
      width: 60px;
      height: 60px;
      opacity: 0.35;
    }
    /* Body styling */

      margin: 18px 18px 18px 18px; /* Add outer space (adjust as needed) */
    }

  document.addEventListener('DOMContentLoaded', () => {

    // ========== DYNAMIC VERSION FETCHING SYSTEM ==========
    let allowedVersionsCache = null; // Global cache for allowed versions
    let allowedVersionsPromise = null; // Promise to avoid multiple simultaneous requests

    /**
     * Fetch allowed versions from backend dynamically
     * Uses caching to avoid repeated API calls
     */
    async function fetchAllowedVersions() {
      // Return cached versions if available
      if (allowedVersionsCache) {
        return allowedVersionsCache;
      }

      // Return existing promise if already in progress
      if (allowedVersionsPromise) {
        return allowedVersionsPromise;
      }

      // Create new promise for fetching versions
      allowedVersionsPromise = fetch('/dayplanning/get_allowed_versions/')
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          return response.json();
        })
        .then(data => {
          if (data.success && Array.isArray(data.allowed_versions)) {
            allowedVersionsCache = data.allowed_versions;
            console.log('✅ Dynamic versions loaded:', allowedVersionsCache);
            return allowedVersionsCache;
          } else {
            throw new Error(data.error || 'Invalid response format');
          }
        })
        .catch(error => {
          console.error('❌ Failed to fetch allowed versions:', error);
          // Fallback to empty array - let backend handle validation
          allowedVersionsCache = [];
          return allowedVersionsCache;
        })
        .finally(() => {
          allowedVersionsPromise = null; // Reset promise
        });

      return allowedVersionsPromise;
    }

    /**
     * Validate version code against dynamically fetched allowed versions
     * @param {string} versionCode - Version code to validate
     * @returns {Promise<{isValid: boolean, message?: string}>}
     */
    async function validateVersionCode(versionCode) {
      try {
        const allowedVersions = await fetchAllowedVersions();
        
        // If no versions loaded (API error), skip frontend validation
        // Backend will handle the validation
        if (!allowedVersions || allowedVersions.length === 0) {
          console.warn('⚠️ No allowed versions loaded, skipping frontend validation');
          return { isValid: true };
        }

        const isValid = allowedVersions.includes(versionCode);
        
        if (!isValid) {
          return {
            isValid: false,
            message: `Version code '${versionCode}' not available in Master Data. Available version codes: ${allowedVersions.join(', ')}`
          };
        }

        return { isValid: true };
      } catch (error) {
        console.error('❌ Version validation error:', error);
        // On error, skip frontend validation - let backend handle it
        return { isValid: true };
      }
    }

    // Initialize version loading on page load
    fetchAllowedVersions();
    
    // ========== END DYNAMIC VERSION FETCHING SYSTEM ==========

// Replace the createSimpleDropdown function with this fixed version:

function createSimpleDropdown(td, row, column, currentValue) {
  // Create a simple select element
  const select = document.createElement('select');
  select.className = 'simple-dropdown';
  select.style.cssText = `
    width: 100%;
    min-width: 150px;
    padding: 8px 12px;
    border: 2px solid #126a83;
    border-radius: 6px;
    background: white;
    font-size: 14px;
    cursor: pointer;
    outline: none;
  `;
  
  // Add default option
  const defaultOption = document.createElement('option');
  defaultOption.value = '';
  defaultOption.textContent = `Choose ${column}...`;
  select.appendChild(defaultOption);
  
  // Clear the cell and add select
  td.innerHTML = '';
  td.appendChild(select);
  
  // Load data and populate
  loadDropdownData(column).then(data => {
    // Clear existing options
    select.innerHTML = '';
    
    // Add default option again
    const defaultOpt = document.createElement('option');
    defaultOpt.value = '';
    defaultOpt.textContent = `Choose ${column}...`;
    select.appendChild(defaultOpt);
    
    // Add data options
    data.forEach(item => {
      const option = document.createElement('option');
      const fieldName = column === 'Category' ? 'category_name' : 'location_name';
      option.value = item[fieldName];
      option.textContent = item[fieldName];
      
      // Pre-select current value
      if (item[fieldName] === currentValue) {
        option.selected = true;
      }
      
      select.appendChild(option);
    });
    
    // Focus after loading and open dropdown
    setTimeout(() => {
      select.focus();
      // Try to open the dropdown programmatically
      if (select.showPicker) {
        select.showPicker();
      }
    }, 100);
  });
  
  // Flag to prevent immediate closure
  let isSelecting = false;
  
  // Handle change event - when user actually selects something
  select.addEventListener('change', function(e) {
    e.stopPropagation();
    const selectedValue = this.value;
    
    // Update the data
    row[column] = selectedValue;
    
    // Update the display
    td.textContent = selectedValue || currentValue || '';
    
    console.log(`Selected ${column}:`, selectedValue);
    isSelecting = false;
  });
  
  // Handle blur event - when dropdown loses focus
  select.addEventListener('blur', function(e) {
    // Only close if we're not in the middle of selecting
    if (!isSelecting) {
      setTimeout(() => {
        // If no selection was made, revert to original value
        if (this.parentNode === td) {
          td.textContent = currentValue || '';
        }
      }, 150);
    }
  });
  
  // Handle mousedown on select to indicate selection is starting
  select.addEventListener('mousedown', function(e) {
    isSelecting = true;
  });
  
  // Handle keyboard events
  select.addEventListener('keydown', function(e) {
    e.stopPropagation();
    
    if (e.key === 'Escape') {
      // Cancel and revert
      td.textContent = currentValue || '';
      isSelecting = false;
    } else if (e.key === 'Enter') {
      // Confirm selection
      const selectedValue = this.value;
      row[column] = selectedValue;
      td.textContent = selectedValue || currentValue || '';
      isSelecting = false;
    } else {
      // Any other key means user is navigating
      isSelecting = true;
    }
  });
  
  // Prevent cell click events from interfering
  select.addEventListener('click', function(e) {
    e.stopPropagation();
    isSelecting = true;
  });
}

    async function validatePlatingStockNo(platingStockNo) {
      if (!platingStockNo || platingStockNo.length < 8) {
        return {
          isValid: false,
          message: "Stock number must be at least 8 characters long"
        };
      }

      const platingBase = platingStockNo.split("/")[0];
      
      if (!platingBase.endsWith("02")) {
        return {
          isValid: false,
          message: "Stock number must end with '02'"
        };
      }

      const match = platingBase.match(/^(\d+)([A-Z])([A-Z])([A-Z])02$/);
      if (!match) {
        return {
          isValid: false,
          message: "Invalid format. Expected: ModelNumber + ColorCode + LettersLetters02"
        };
      }

      const [, modelNumber, colorCode, polish_code, version_code] = match;
      
      // ✅ DYNAMIC VERSION VALIDATION - No more hardcoded arrays!
      const versionValidation = await validateVersionCode(version_code);
      if (!versionValidation.isValid) {
        return {
          isValid: false,
          message: versionValidation.message
        };
      }

      // ✅ NEW: Check if plating stock number exists in ModelMaster database
      try {
        const response = await fetch(`/dayplanning/validate_plating_stk_no/?plating_stk_no=${encodeURIComponent(platingStockNo)}`);
        const data = await response.json();
        
        if (!data.success || !data.is_valid) {
          return {
            isValid: false,
            message: data.message || `Plating Stock No "${platingStockNo}" not found in database`
          };
        }
        
        // Return validation success with database data
        return {
          isValid: true,
          data: {
            modelNumber,
            colorCode,
            polish_code,
            version_code,
            ...data.data  // Include database info (model_no, version, brand, etc.)
          }
        };
        
      } catch (error) {
        console.error('❌ Database validation error:', error);
        return {
          isValid: false,
          message: 'Error checking plating stock number in database. Please try again.'
        };
      }
    }

    async function autoFetchRelatedFields(row, platingStockNo) {
      /**
       * Auto-populate Polishing Stk No and Plating Colour based on Plating Stk No
       * 
       * Logic:
       * 1. Extract model number and color code from Plating Stk No
       * 2. Generate Polishing Stk No by replacing color code with 'X'
       * 3. Fetch Plating Colour from backend based on color code
       * 
       * Example:
       * Input: 1805SAB02
       * Output: Polishing Stk No = 1805XAB02, Plating Colour = [fetched from backend]
       */
      
      if (!platingStockNo || platingStockNo.length < 8) {
        return; // Too short to be valid
      }
      
      try {
        // Validate format and extract components
        const platingBase = platingStockNo.split("/")[0];
        
        // Check if ends with "02"
        if (!platingBase.endsWith("02")) {
          showAutoFetchMessage("Plating Stk No must end with '02'", 'warning');
          return;
        }
        
        // Extract model, color code, and suffix using regex with version code validation
        const match = platingBase.match(/^(\d+)([A-Z])([A-Z])([A-Z])02$/);
        if (!match) {
          showAutoFetchMessage("Invalid Plating Stk No format. Expected: ModelNumber + ColorCode + LettersLetters02", 'warning');
          return;
        }
        
        const [, modelNumber, colorCode, polish_code, version_code] = match;
        
        // ✅ DYNAMIC VERSION VALIDATION - No more hardcoded arrays!
        const versionValidation = await validateVersionCode(version_code);
        if (!versionValidation.isValid) {
          showAutoFetchMessage(`❌ ${versionValidation.message}`, 'error');
          return;
        }

        // Generate Polishing Stk No by replacing color code with 'X'
        const polishingStockNo = `${modelNumber}X${polish_code}${version_code}02`;
        row['Polishing Stk No'] = polishingStockNo;
        
        // Mark as auto-filled for visual indication
        if (!row._autoFilled) row._autoFilled = [];
        if (!row._autoFilled.includes('Polishing Stk No')) {
          row._autoFilled.push('Polishing Stk No');
        }
        
        // Show loading state
        showAutoFetchMessage("Auto-fetching plating colour...", 'info');
        
        // Fetch plating colour from backend
        fetchPlatingColour(colorCode, platingStockNo)
          .then(platingColour => {
            if (platingColour) {
              row['Plating Colour'] = platingColour;
              // Mark plating colour as auto-filled
              if (!row._autoFilled.includes('Plating Colour')) {
                row._autoFilled.push('Plating Colour');
              }
              showAutoFetchMessage(`✅ Auto-filled: Polishing Stk No → ${polishingStockNo}, Plating Colour → ${platingColour}`, 'success');
            } else {
              showAutoFetchMessage(`✅ Polishing Stk No auto-filled → ${polishingStockNo}. Please manually enter Plating Colour.`, 'warning');
            }
            // Re-render table to show updated values
            renderTable();
          })
          .catch(error => {
            console.error('Error fetching plating colour:', error);
            showAutoFetchMessage(`✅ Polishing Stk No auto-filled → ${polishingStockNo}. Could not fetch Plating Colour.`, 'warning');
            // Re-render table to show at least the polishing stock number
            renderTable();
          });
        
      } catch (error) {
        console.error('Error in auto-fetch:', error);
        showAutoFetchMessage("Error processing Plating Stk No", 'error');
      }
    }
    
    function fetchPlatingColour(colorCode, platingStockNo) {
      /**
       * Fetch plating colour from backend based on color code
       * This makes an API call to validate and get the plating colour
       */
      return fetch('/dayplanning/get_plating_colour/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({
          color_code: colorCode,
          plating_stock_no: platingStockNo
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success && data.plating_colour) {

    if (downloadTemplateBtn) {
      downloadTemplateBtn.addEventListener('click', async function(e) {
        e.preventDefault();
        const endpoint = '/dayplanning/download_excel_template/';
        const prevDisabled = downloadTemplateBtn.disabled;
        downloadTemplateBtn.disabled = true;
        try {
          // show overlay
          if (downloadOverlay) { downloadOverlay.style.display = 'flex'; }
          downloadLabel.textContent = 'Starting download...';
          downloadBar.style.width = '0%'; downloadPct.textContent = '0%';

          const resp = await fetch(endpoint, { credentials: 'same-origin' });
          if (!resp.ok) throw new Error('Server returned ' + resp.status);

          // get content-length if provided
          const contentLength = resp.headers.get('Content-Length');
          const total = contentLength ? parseInt(contentLength, 10) : null;

          if (!resp.body) {
            // fallback: read blob at once
            const blob = await resp.blob();
            const url = window.URL.createObjectURL(blob);
            const disp = resp.headers.get('Content-Disposition');
            let filename = 'DayPlanning_Template.xlsx';
            if (disp) {
              const m = disp.match(/filename\*=UTF-8''([^;\n]+)/i) || disp.match(/filename="?([^;\n"]+)"?/i);
              if (m && m[1]) filename = decodeURIComponent(m[1].replace(/\"/g, ''));
            }
            const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); window.URL.revokeObjectURL(url);
            if (downloadOverlay) downloadLabel.textContent = 'Download complete';

            showDownloadSuccessVisual('Template downloaded successfully to your local');
            setTimeout(()=>{ if (downloadOverlay) downloadOverlay.style.display='none'; downloadTemplateBtn.disabled = prevDisabled; },900);
            return;
          }

          const reader = resp.body.getReader();
          const chunks = [];
          let received = 0;
          while(true){
            const {done, value} = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (total) {
              const pct = Math.round((received/total)*100);
              downloadBar.style.width = pct + '%';
              downloadPct.textContent = pct + '%';
              downloadLabel.textContent = 'Downloading...';
            } else {
              // indeterminate progress animation
              const approx = Math.min(98, Math.round((received/1024)/50));
              downloadBar.style.width = approx + '%';
              downloadPct.textContent = approx + '%';
              downloadLabel.textContent = 'Downloading...';
            }
          }

          // combine chunks
          const blob = new Blob(chunks);
          const url = window.URL.createObjectURL(blob);
          const disp = resp.headers.get('Content-Disposition');
          let filename = 'DayPlanning_Template.xlsx';
          if (disp) {
            const m = disp.match(/filename\*=UTF-8''([^;\n]+)/i) || disp.match(/filename="?([^;\n"]+)"?/i);
            if (m && m[1]) filename = decodeURIComponent(m[1].replace(/\"/g, ''));
          }
          const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); window.URL.revokeObjectURL(url);

          // success UI
          downloadBar.style.width = '100%'; downloadPct.textContent = '100%'; downloadLabel.textContent = 'Download complete';
          if (typeof showToast === 'function') showToast('Download Complete','Template downloaded successfully to your local','success');
          showDownloadSuccessVisual('Template downloaded successfully to your local');
          setTimeout(()=>{ if (downloadOverlay) downloadOverlay.style.display='none'; downloadTemplateBtn.disabled = prevDisabled; },900);

        } catch (err) {
          if (downloadOverlay) downloadOverlay.style.display='none';
          downloadTemplateBtn.disabled = prevDisabled;
          const msg = err && err.message ? err.message : 'Download failed';
          if (typeof showToast === 'function') {
            showToast('Download Failed', msg, 'error');
          } else {
            alert('Download failed: ' + msg);
          }
        }
      });
    }

function handleFileSelect(e) {
  const selectedFiles = Array.from(e.target.files);

  const validTypes = [

    'application/vnd.ms-excel'
  ];
  if (!validTypes.includes(file.type) && !file.name.endsWith('.xls') && !file.name.endsWith('.xlsx')) {
    Swal.fire({
      icon: 'error',
      title: 'Invalid file format',
      text: 'Please upload only Excel files (.xlsx, .xls)',
      width: '500px'
    });
    return;
  }

  // Clear any existing data
  files = [];
  tableData = [];
  fileDataMap.clear();

  // Add the new file
  files.push(file);



  // Prepare FormData for AJAX upload
  const formData = new FormData();
  formData.append('file', file);

  fetch('/dayplanning/bulk_upload/preview/', {
    method: 'POST',
    headers: {
      'X-CSRFToken': getCookie('csrftoken')
    },
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    Swal.close(); // Close loading dialog
    
    if (data.success) {
      // Store file data in map
      fileDataMap.set(file.name, data.data);
      
      // Add new rows with proper S.NO
      const newRows = data.data.map((row, idx) => ({
        ...row,

      tableData = newRows;

      disableUploadControls();

                           data.error.includes('Missing') && data.error.includes('column');

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

        const validRows = tableData.filter(row => {
          const hasData = Object.keys(row).some(key => {
            if (key === 'S.NO' || key === '_fileSource') return false; // Skip S.NO and internal fields for validation
            return row[key] && row[key].toString().trim() !== '';
          });
          return hasData;
        });

        if (validRows.length === 0) {
          Swal.fire({
            icon: 'warning',
            title: 'No Valid Data',
            text: 'Please ensure at least one row has complete data before submitting.'
          });
          return;
        }

        // Server-side validation handles all row checks and returns detailed errors.
        // No sequential per-row HTTP calls needed here.

        // Clean rows by removing internal fields
        const cleanRows = validRows.map(row => {
          const cleanRow = { ...row };
          delete cleanRow._fileSource;
          delete cleanRow._autoFilled;
          return cleanRow;
        });

        // Send data to the bulk upload endpoint
        fetch('/dayplanning/bulk_upload/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({ rows: cleanRows })
        })
        .then(async response => {
          const contentType = response.headers.get('content-type');
          let data = {};

          if (contentType && contentType.includes('application/json')) {
            data = await response.json();
          } else {
            const text = await response.text();
            try {
              data = JSON.parse(text);
            } catch (e) {
              data = { error: text };
            }
          }

          if (response.ok && data.success) {
            let alertContent = data.message || 'Your data has been submitted successfully.';
            let alertType = 'success';
            let alertTitle = 'Success!';

            if (data.failed_rows && data.failed_rows.length > 0) {
              // Partial success - some rows failed
              alertType = 'warning';
              alertTitle = '⚠️ Partial Success';
              const failedRowsText = data.failed_rows.slice(0, 10).join('<br>');
              const moreErrors = data.failed_rows.length > 10
                ? `<br><br>... and ${data.failed_rows.length - 10} more errors.`
                : '';
              alertContent = `
                <div style="text-align:left;">
                  <strong>${data.message}</strong><br><br>
                  <strong>Details:</strong><br>
                  ${failedRowsText}${moreErrors}
                </div>
              `;

              // Extract failed row numbers from error messages
              const failedRowNumbers = new Set();
              data.failed_rows.forEach(errorMsg => {
                const match = errorMsg.match(/Row (\d+):/);
                if (match) {
                  failedRowNumbers.add(parseInt(match[1]));
                }
              });

              // Remove successful rows, keep only failed rows
              if (failedRowNumbers.size > 0) {
                // Create a mapping of original row indices to current tableData indices
                const originalToCurrentMapping = new Map();
                validRows.forEach((row, validIndex) => {
                  const originalRowIndex = validIndex + 1; // Row numbers start from 1
                  const currentIndex = tableData.findIndex(tableRow => 
                    tableRow['S.NO'] === row['S.NO'] || 
                    (tableRow['Plating Stk No'] === row['Plating Stk No'] && 
                     tableRow['Polishing Stk No'] === row['Polishing Stk No'] && 
                     tableRow['Plating Colour'] === row['Plating Colour'] && 
                     tableRow['Category'] === row['Category'] && 
                     tableRow['Input Qty'] === row['Input Qty'] && 
                     tableRow['Source'] === row['Source'])
                  );
                  if (currentIndex !== -1) {
                    originalToCurrentMapping.set(originalRowIndex, currentIndex);
                  }
                });

                // Filter tableData to keep only failed rows
                const failedRows = tableData.filter((row, index) => {
                  // Check if this row corresponds to any failed row
                  for (let [originalIndex, currentIndex] of originalToCurrentMapping.entries()) {
                    if (currentIndex === index && failedRowNumbers.has(originalIndex)) {
                      return true;
                    }
                  }
                  return false;
                });

                // Re-index the failed rows
                tableData = failedRows.map((row, index) => ({
                  ...row,
                  'S.NO': String(index + 1)
                }));

                // Re-render the table with only failed rows
                renderTable();
              }
            } else {
              // ========== BUG FIX: Complete success - clear all data and ENABLE UPLOAD CONTROLS ==========
              tableData = [];
              files = [];
              fileDataMap.clear();
              renderTable();  // This will show/hide empty state and table automatically
              renderFileList();
              
              // ENABLE UPLOAD CONTROLS AFTER SUCCESSFUL SUBMISSION
              enableUploadControls();
            }

            Swal.fire({
              icon: alertType,
              title: alertTitle,
              html: alertContent,
              width: '600px',
              showConfirmButton: true
            });
          } else {
            // Handle error response
            let errorHtml = '';
            if (data.failed_rows && data.failed_rows.length > 0) {
              errorHtml = '<div style="text-align:left;">' +
                data.failed_rows.map(msg => `<div>${msg}</div>`).join('') +
                '</div>';
            }
            Swal.fire({
              icon: 'error',
              title: 'Submission Failed',
              html: (data.error ? `<div>${data.error}</div>` : '') + errorHtml,
              width: '600px',
              showConfirmButton: true
            });
          }
        })
        .catch(error => {
          console.error('Submission error:', error);
          Swal.fire({
            icon: 'error',
            title: 'Network Error',
            text: 'Could not submit data. Please check your connection and try again.',
            showConfirmButton: true
          });
        });
      });

    function formatFileSize(bytes) {
      if (!bytes) return '0 Bytes';
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return `${(bytes / Math.pow(1024, i)).toFixed(2)} ${sizes[i]}`;
