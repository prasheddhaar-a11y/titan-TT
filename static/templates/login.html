{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <!-- Style -->
    <style>
      .brand-logo {
        perspective: 1000px; /* needed for 3D flip */
      }

      /* gentle flip-flop (left-right) */
      .brand-logo img {
        display: block;
        margin: 0 auto;
        max-width: 180px;
        max-height: 120px;
        transform-origin: center center;
        transform-style: preserve-3d;
        will-change: transform;
        backface-visibility: hidden;
        animation: none;
      }

      /* flip-flop keyframes */
      @keyframes flipflop {
        0% {
          transform: rotateY(-25deg);
        }
        50% {
          transform: rotateY(90deg);
        }
        100% {
          transform: rotateY(-25deg);
        }
      }

      /* Respect reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        .brand-logo img {
          animation: none;
          transform: none;
        }
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: radial-gradient(circle at top left, rgba(20, 160, 160, 0.16), transparent 24%),
          radial-gradient(circle at bottom right, rgba(17, 89, 96, 0.28), transparent 22%),
          linear-gradient(180deg, #08111a 0%, #0b2432 100%);
        color: #f4f7fb;
        overflow-x: hidden;
        position: relative;
      }
      /* Right-side static illustration */
      .right-vec-container {
        position: absolute;
        right: 6vw;
        top: 50%;
        transform: translateY(-50%);
        width: 44vw;
        max-width: 780px;
        z-index: 3;
        pointer-events: none;
        display: block;
      }
      .right-vec-container img {
        width: 100%;
        height: auto;
        object-fit: contain;
        display: block;
        filter: none;
      }
      @media (max-width: 991px) {
        .right-vec-container {
          display: none !important;
        }
      }
      .bg-blur-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        backdrop-filter: blur(1px);
        -webkit-backdrop-filter: blur(14px);
        z-index: 0;
      }
      .container-scroller,
      .page-body-wrapper,
      .content-wrapper {
        background: transparent !important;
        position: relative;
        z-index: 2;
      }
      .login-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      /* New centered card layout (override earlier positioning) */
      .page-card {
        width: min(940px, 92%);
        margin: 0 auto;
        background: linear-gradient(135deg, rgba(12, 23, 34, 0.94) 0%, rgba(20, 35, 50, 0.92) 50%, rgba(12, 23, 34, 0.94) 100%);
        background-size: 400% 400%;
        animation: subtle-shift 8s ease infinite;
        border-radius: 28px;
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          inset 0 0 40px rgba(58, 213, 216, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
        display: flex;
        min-height: 492px;
        backdrop-filter: blur(18px);
      }
      @keyframes subtle-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .page-card .card-left {
        width: 52%;
        padding: 42px 44px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: transparent;
      }
      .page-card .card-right {
        width: 48%;
        position: relative;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
        border-left: 1px solid rgba(255, 255, 255, 0.08);
      }
      .card-right::before {
        content: "";
        position: absolute;
        left: 5%;
        top: 4%;
        width: 90%;
        height: 90%;
        background: radial-gradient(circle at 20% 20%, rgba(13, 148, 136, 0.18), transparent 45%);
        border-radius: 50%;
        z-index: 0;
      }
      .card-right img {
        position: relative;
        z-index: 1;
        width: min(86%, 360px);
        height: auto;
        max-height: 430px;
        object-fit: contain;
        pointer-events: none;
      }
      /* Keep only the outer page card as the visual container */
      .auth-form-light.text-left.py-5.px-4.px-sm-5 {
        background: transparent !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        padding: 0 !important;
        border: none !important;
      }
      .login-title {
        color: #f5fbff;
        font-size: clamp(2.2rem, 2.6vw, 2.8rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        margin-bottom: 10px;
        line-height: 1.05;
      }
      .login-subtitle {
        color: #b8d8ea;
        font-weight: 400;
        font-family: inherit;
        margin: 0 0 20px;
        text-align: left;
        font-size: 1.02rem;
        line-height: 1.7;
        letter-spacing: 0.01em;
      }
      .login-note {
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.95rem;
        margin-bottom: 28px;
      }
      .mt-3 {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        flex-wrap: nowrap;
        flex-shrink: 0;
      }
      .btn-primary.auth-form-btn {
        width: auto !important;
        min-width: 150px !important;
        padding: 14px 28px !important;
      }
      .btn-microsoft.auth-form-btn {
        width: auto !important;
        min-width: 150px !important;
        padding-left: 14px !important;
        padding-right: 14px !important;
      }
      /* Responsive: stack vertically on small screens */
      @media (max-width: 900px) {
        .page-card {
          flex-direction: column;
          min-height: auto;
        }
        .page-card .card-left,
        .page-card .card-right {
          width: 100%;
          padding: 28px;
        }
        .card-right::before {
          display: none;
        }
        .mt-3 {
          flex-wrap: wrap;
          justify-content: center;
        }
      }
      /* Image carousel styles */
      .image-carousel {
        position: absolute;
        right: 0;
        left: auto;
        top: 0;
        width: 50vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
        overflow: hidden;
      }
      .carousel-slide {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }
      .carousel-slide.active {
        opacity: 1;
      }
      .carousel-slide img {
        max-width: 80%;
        max-height: 80%;
        object-fit: contain;
        display: block;
        pointer-events: none;
        user-select: none;
      }
      .form-control,
      .form-control-lg {
        border-radius: 8px !important;
        background: rgba(255, 255, 255, 0.11) !important;
        color: #f3fafc !important;
        border: 1px solid rgba(255, 255, 255, 0.22) !important;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.16);
        transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        min-height: 56px;
        padding: 14px 16px !important;
        font-size: 15px;
        font-weight: 500;
      }
      .form-control::placeholder,
      .form-control-lg::placeholder {
        color: rgba(255, 255, 255, 0.65) !important;
        font-weight: 400;
      }
      .form-control:focus,
      .form-control-lg:focus {
        background: rgba(255, 255, 255, 0.11) !important;
        color: #f3fafc !important;
        border-color: rgba(58, 213, 216, 0.9) !important;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.16), 0 0 16px rgba(58, 213, 216, 0.24) !important;
        outline: none !important;
      }
      
      /* Prevent browser autofill from changing background */
      .form-control:-webkit-autofill,
      .form-control-lg:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 1000px rgba(30, 43, 58, 0.7) inset !important;
        -webkit-text-fill-color: #f3fafc !important;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.16) !important;
        transition: background-color 5000s ease-in-out 0s;
      }
      
      /* Loading overlay styles */
      .loading-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(8, 17, 26, 0.95);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(8px);
      }
      .loading-overlay.active {
        display: flex;
      }
      .loading-overlay img {
        max-width: 300px;
        max-height: 300px;
        width: 80%;
        height: auto;
        filter: drop-shadow(0 0 40px rgba(58, 213, 216, 0.4));
      }
      .login-loading-spinner {
        width: 86px;
        height: 86px;
        border: 7px solid rgba(58, 213, 216, 0.18);
        border-top-color: #3ad5d8;
        border-radius: 50%;
        animation: login-spin 0.85s linear infinite;
        filter: drop-shadow(0 0 28px rgba(58, 213, 216, 0.35));
      }
      @keyframes login-spin {
        to { transform: rotate(360deg); }
      }

      /* Input icon styles */
      .input-with-icon {
        position: relative;
        width: 100%;
      }
      .input-with-icon .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        color: rgba(255, 255, 255, 0.92);
        opacity: 1;
      }
      .input-with-icon .input-icon svg {
        width: 24px;
        height: 24px;
        display: block;
      }
      .input-with-icon .input-icon svg path,
      .input-with-icon .input-icon svg circle,
      .input-with-icon .input-icon svg rect,
      .input-with-icon .input-icon svg line {
        fill: currentColor;
        stroke: currentColor;
      }
      .input-with-icon .form-control {
        padding-left: 52px !important;
        padding-right: 52px !important;
        width: 100%;
        box-sizing: border-box;
      }
      .page-card form,
      .page-card .form-group {
        width: 100%;
      }
      .auth-form-btn {
        width: auto !important;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0 !important;
        padding: 14px 26px !important;
        line-height: 1;
        font-size: 16px !important;
        border-radius: 14px !important;
        text-transform: none; /* keep original casing */
        letter-spacing: normal;
        font-weight: 500 !important;
        min-height: 52px;
      }
      .mt-3 {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: flex-start;
      }
      .btn-primary:hover,
      .btn-primary:active {
        background-color: rgb(26, 109, 100) !important;
        border-color: rgb(35, 88, 82) !important;
        color: #fff !important;
      }
      /* Specific styling for the large auth button */
      .btn-primary.auth-form-btn {
        border-radius: 8px !important;
        background: linear-gradient(180deg, #28c3bd 0%, #0f7f7a 45%, #0a6b66 100%) !important;
        color: #ffffff !important;
        box-shadow: 0 8px 20px rgba(10, 95, 90, 0.28);
        min-width: 150px !important;
        transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      }
      .btn-primary.auth-form-btn:hover,
      .btn-primary.auth-form-btn:active {
        background: linear-gradient(180deg, #0c7d77 0%, #06524f 100%) !important;
        border-color: rgba(0, 0, 0, 0.08) !important;
        box-shadow: 0 10px 28px rgba(6, 70, 63, 0.28) !important;
        transform: translateY(-1px);
      }
      /* Microsoft button styling (refined) */
      .btn-microsoft {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 18px;
        height: 52px;
        min-height: 52px;
        background: rgba(255, 255, 255, 0.12);
        color: #f3fafc;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.12), 0 8px 20px rgba(0, 0, 0, 0.1);
        text-decoration: none;
        font-weight: 500;
        align-self: center;
        transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      }
      /* smaller variant when used with .auth-form-btn */
      .btn-microsoft.auth-form-btn {
        width: auto !important;
        min-width: 150px !important;
        padding: 14px 20px !important;
        min-height: 52px !important;
        height: 52px !important;
        box-shadow: 0 6px 18px rgba(10, 15, 30, 0.1) !important;
        justify-content: center;
      }
      .btn-microsoft .ms-logo {
        margin-right: 10px;
        flex-shrink: 0;
      }
      .btn-microsoft span {
        /* allow the label to wrap inside the button */
        white-space: normal;
        display: inline-block;
        line-height: 1.05;
      }
      .btn-microsoft .ms-text {
        font-size: 14px;
        font-weight: 500;
        color: #f3fafc;
      }
      .btn-microsoft:hover {
        background: rgba(255, 255, 255, 0.18);
        transform: translateY(-2px);
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.12), 0 14px 28px rgba(0, 0, 0, 0.14);
      }
      .ms-logo {
        width: 16px;
        height: 16px;
        display: inline-block;
        flex: 0 0 16px;
      }
      .cancelBtn {
        background: #b63c3c !important;
        color: #fff !important;
        border: 2px solid #b63c3c !important;
        border-radius: 30px !important;
        font-size: 18px !important;
        font-weight: 500 !important;
        padding: 10px 0 !important;
        width: 48% !important;
        margin-top: 0;
        margin-left: 4%;
        box-shadow: 0 2px 12px rgba(255, 59, 59, 0.07);
        transition:
          background 0.2s,
          color 0.2s;
        display: inline-block;
      }
      .cancelBtn:hover,
      .cancelBtn:active {
        background: #f00e0e !important;
        color: #ffffff !important;
        border-color: #ff3b3b !important;
      }
      h4 {
        color: #fff !important;
        font-weight: 400 !important;
        font-size: 25px !important;
      }
      h6 {
        color: #fff !important;
        font-weight: 300 !important;
      }
      .brand-logo {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 18px;
        margin-top: -30px;
      }
      .brand-logo img {
        display: block;
        margin: 0 auto;
        max-width: 180px;
        max-height: 120px;
      }
      @media (max-width: 991px) {
        .col-lg-4 {
          margin-right: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
        }
        .content-wrapper.d-flex.align-items-center.justify-content-end.auth.px-0 {
          justify-content: center !important;
          padding: 0 8px !important;
        }
        .row.w-100.mx-0 {
          margin: 0 !important;
          width: 100% !important;
          justify-content: center !important;
        }
        .brand-logo {
          margin-top: -48px !important;
          margin-bottom: 10px !important;
        }
        .mt-3 {
          display: flex;
          justify-content: center;
        }
        .auth-form-btn {
          width: auto !important;
          min-width: 120px;
        }
        .image-carousel {
          display: none !important;
        }
      }
      @media (max-width: 600px) {
        .auth-form-light.text-left.py-5.px-4.px-sm-5 {
          padding: 18px 10px !important;
          border-radius: 28px !important;
        }
        .brand-logo img {
          max-width: 130px !important;
          max-height: 90px !important;
        }
        h4,
        h6 {
          text-align: center !important;
        }
        .image-carousel {
          display: none !important;
        }
      }
      /* Mobile-first responsive refinements */
      :root {
        font-size: clamp(14px, 2.6vw, 16px);
      }
      img {
        max-width: 100%;
        height: auto;
      }
      .container-scroller,
      .page-body-wrapper,
      .content-wrapper,
      .row.w-100.mx-0,
      .col-lg-4 {
        width: 100%;
        max-width: 100%;
      }
      input,
      button,
      .btn,
      .form-control,
      .form-control-lg,
      .auth-form-btn,
      .cancelBtn {
        min-height: 44px;
      }
      .mt-3 {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.8rem;
        flex-wrap: wrap;
        width: 100%;
      }
      .auth-form-btn,
      .cancelBtn {
        width: auto !important;
        margin: 0 !important;
      }
      @media (max-width: 480px) {
        .login-shell,
        .content-wrapper.d-flex.align-items-center.justify-content-end.auth.px-0 {
          justify-content: center !important;
          padding: 0.75rem !important;
        }
        .col-lg-4 {
          margin-right: 0 !important;
        }
        .auth-form-light.text-left.py-5.px-4.px-sm-5 {
          border-radius: 1.15rem !important;
          padding: 1rem !important;
        }
      }
      @media (min-width: 481px) and (max-width: 768px) {
        :root {
          font-size: clamp(14px, 2vw, 16px);
        }
        .col-lg-4 {
          max-width: 85% !important;
          margin-right: 0 !important;
        }
      }
      @media (min-width: 769px) and (max-width: 1024px) {
        :root {
          font-size: clamp(15px, 1.5vw, 17px);
        }
        .col-lg-4 {
          max-width: 58% !important;
          margin-right: 4vw !important;
        }
      }
      @media (min-width: 1025px) {
        .mt-3 {
          flex-direction: row;
          align-items: center;
        }
      }
    </style>

    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Titan</title>
    <link
      rel="stylesheet"
      href="{% static 'assets/vendors/feather/feather.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/vendors/ti-icons/css/themify-icons.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/vendors/css/vendor.bundle.base.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/css/vertical-layout-light/style.css' %}"
    />
    <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}" />
  </head>

  <body>
    <div class="bg-blur-overlay"></div>
    
    <!-- Loading overlay with scanner animation -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="login-loading-spinner" aria-label="Loading"></div>
    </div>

    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div
          class="content-wrapper login-shell d-flex align-items-center justify-content-center auth px-0"
          style="min-height: 100vh"
        >
          <div class="page-card" role="main">
            <div class="card-left">
              <div class="auth-form-light text-left py-5 px-4 px-sm-5">
                <div class="brand-logo">
                  <img
                    src="{% static 'assets/logo/titan_logo.png' %}"
                    alt="Titan logo"
                  />
                </div>
                <h1 class="login-title">Titan Track & Trace</h1>
              <p class="login-subtitle">Secure access to the factory workflow dashboard.</p>
                <!-- <p class="login-note">Sign in with your Titan credentials or continue with Microsoft SSO.</p> -->
                {% if error %}
                <div class="alert alert-danger" style="margin-bottom: 16px">
                  {{ error }}
                </div>
                {% endif %}
                <form class="pt-3" method="post" action="{% url 'login' %}">
                  {% csrf_token %}
                  <div class="form-group input-with-icon">
                    <span class="input-icon" aria-hidden="true">
                      <svg
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                        focusable="false"
                        aria-hidden="true"
                      >
                        <path
                          d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-3.866 0-7 1.79-7 4v1h14v-1c0-2.21-3.134-4-7-4z"
                        />
                      </svg>
                    </span>
                    <input
                      type="text"
                      name="username"
                      id="usernameInput"
                      class="form-control form-control-lg"
                      placeholder="Email or phone number"
                      autocomplete="off"
                    />
                  </div>
                  <div
                    class="form-group input-with-icon"
                    style="position: relative"
                  >
                    <span class="input-icon" aria-hidden="true">
                      <svg
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                        focusable="false"
                        aria-hidden="true"
                      >
                        <path
                          d="M17 8V7a5 5 0 00-10 0v1H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2v-8a2 2 0 00-2-2h-2zm-7-1a3 3 0 016 0v1H10V7zm2 9a2 2 0 11.001-4.001A2 2 0 0112 16z"
                        />
                      </svg>
                    </span>
                    <input
                      type="password"
                      name="password"
                      id="passwordInput"
                      class="form-control form-control-lg"
                      placeholder="Password"
                      autocomplete="off"
                    />
      
                  </div>
                  <div class="mt-3">
                    <button type="submit" class="btn btn-primary auth-form-btn" id="loginBtn">
                      Login
                    </button>
                    {% if enable_microsoft_login %}
                    <a href="{% url 'microsoft_login' %}" class="btn-microsoft auth-form-btn" aria-label="Login with Microsoft">
                      <!-- Inline Microsoft logo (4 tiles) -->
                      <span class="ms-logo" aria-hidden="true">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18" role="img" focusable="false">
                          <rect x="1" y="1" width="10" height="10" fill="#f35325" />
                          <rect x="13" y="1" width="10" height="10" fill="#81bc06" />
                          <rect x="1" y="13" width="10" height="10" fill="#05a6f0" />
                          <rect x="13" y="13" width="10" height="10" fill="#ffba08" />
                        </svg>
                      </span>
                      <span class="ms-text">Sign-in with Microsoft</span>
                    </a>
                    {% endif %}
                  </div>
                </form>
              </div>
            </div>
            <div class="card-right" aria-hidden="true">

              <img
                src="{% static 'assets/images/1.jpg' %}"
                alt="illustration"
                decoding="async"
              />
            </div>
          </div>
        </div>
        <!-- content-wrapper ends -->
      </div>
      <!-- page-body-wrapper ends -->
    </div>
    <!-- container-scroller -->
    <!-- Gallery grid and tilt effect JS -->
    <script nonce="{{ csp_nonce }}">
      // Auto-sliding carousel
      let currentSlide = 0;
      const slides = document.querySelectorAll(".carousel-slide");
      const totalSlides = slides.length;

      function showSlide(n) {
        if (totalSlides === 0) return;
        // Remove active class from all slides
        slides.forEach((slide) => slide.classList.remove("active"));
        // Add active class to current slide
        slides[n].classList.add("active");
      }

      function nextSlide() {
        currentSlide = (currentSlide + 1) % totalSlides;
        showSlide(currentSlide);
      }

      // Auto-slide every 4 seconds
      if (totalSlides > 0) {
        setInterval(nextSlide, 4000);
      }

      // Password show/hide toggle
      document.addEventListener("DOMContentLoaded", function () {
        const passwordInput = document.getElementById("passwordInput");
        const togglePassword = document.getElementById("togglePassword");
        const eyeOpen = document.getElementById("eyeOpen");
        const eyeClosed = document.getElementById("eyeClosed");
        const usernameInput = document.getElementById("usernameInput");
        const cancelBtn = document.getElementById("cancelBtn");
        const loginForm = document.querySelector("form");
        const loadingOverlay = document.getElementById("loadingOverlay");
        let visible = false;
        
        // Show loading overlay on form submit
        if (loginForm && loadingOverlay) {
          loginForm.addEventListener("submit", function(e) {
            loadingOverlay.classList.add("active");
          });
        }

        // ensure icons reflect current password field state
        if (passwordInput && eyeOpen && eyeClosed) {
          if (passwordInput.type === "password") {
            eyeOpen.style.display = "inline";
            eyeClosed.style.display = "none";
            visible = false;
          } else {
            eyeOpen.style.display = "none";
            eyeClosed.style.display = "inline";
            visible = true;
          }
        }

        if (togglePassword) {
          // primary toggle target (span) — toggle on click
          togglePassword.addEventListener("click", function () {
            visible = !visible;
            if (visible) {
              if (passwordInput) passwordInput.type = "text";
              if (eyeOpen) eyeOpen.style.display = "none";
              if (eyeClosed) eyeClosed.style.display = "inline";
            } else {
              if (passwordInput) passwordInput.type = "password";
              if (eyeOpen) eyeOpen.style.display = "inline";
              if (eyeClosed) eyeClosed.style.display = "none";
            }
          });
          // Also attach clicks directly to the SVGs (some browsers deliver events to svg)
          if (eyeOpen)
            eyeOpen.addEventListener("click", () => togglePassword.click());
          if (eyeClosed)
            eyeClosed.addEventListener("click", () => togglePassword.click());
          // allow keyboard activation
          togglePassword.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              togglePassword.click();
            }
          });
        }

        // Cancel button clears inputs and resets password field (if present)
        if (cancelBtn) {
          cancelBtn.addEventListener("click", function () {
            if (usernameInput) usernameInput.value = "";
            if (passwordInput) passwordInput.value = "";
            if (passwordInput) passwordInput.type = "password";
            visible = false;
            if (eyeOpen) eyeOpen.style.display = "inline";
            if (eyeClosed) eyeClosed.style.display = "none";
          });
        }
      });

      // ...existing code... (other DOMContentLoaded blocks removed to avoid conflicts)
    </script>
  </body>
</html>
